                pronunciation: "เอ็กแซคลี่. อิทส์ จัสท์ อะ เทสต์. เล็ตส์ จัสท์ ดู เดอะ เบสต์ วี แคน ไรท์ นาว. แอนด์ อิฟ วี แครช แอนด์ เบิร์น... เวล, วีลล์ ซี ด็อกเตอร์ แฮร์ริสัน อิน จูลาย แอนด์ โชว์ ฮิม วอท วีฝ์ แอคชวลลี่ ก็อท.",
                translation: "ใช่เลย มันก็แค่การสอบ เรามาทำให้ดีที่สุดในตอนนี้กันเถอะ และถ้าเราพังไม่เป็นท่า... เราค่อยไปเจอ ดร.แฮร์ริสัน เดือนกรกฎาคม แล้วทำให้เขาเห็นว่าของจริงมันเป็นยังไง"
            },
            {
                character: "Leo",
                avatar: "L",
                dialogue: "Deal. Alright, let's look at those integrals one more time. Slowly.",
                pronunciation: "ดีล. ออลไรท์, เล็ตส์ ลุค แอท โดส อินทิกรัลส์ วัน มอร์ ไทม์. สโลว์ลี่.",
                translation: "ตกลง เอาล่ะ เรามาดูเรื่องอินทิกรัลนั่นกันอีกสักรอบ ช้าๆ"
            }
        ];

        function renderDialogue() {
            const container = document.getElementById('dialogueContainer');
            container.innerHTML = '';

            dialogueData.forEach((item) => {
                if (item.scene) {
                    const sceneEl = document.createElement('div');
                    sceneEl.className = 'scene-header';
                    sceneEl.textContent = item.scene;
                    container.appendChild(sceneEl);

                    const timestampEl = document.createElement('div');
                    timestampEl.className = 'timestamp';
                    timestampEl.textContent = item.timestamp;
                    container.appendChild(timestampEl);
                } else {
                    const dialogueEl = document.createElement('div');
                    dialogueEl.className = `dialogue-block ${item.character.toLowerCase()}`;

                    let content = `
                        <div class="character-section">
                            <div class="avatar ${item.character.toLowerCase()}">${item.avatar}</div>
                            <div class="dialogue-content">
                                <div class="character-name ${item.character.toLowerCase()}">${item.character}</div>
                    `;

                    if (item.action) {
                        content += `<div class="action">${item.action}</div>`;
                    }

                    content += `
                                <div class="dialogue-text">${item.dialogue}</div>
                    `;

                    if (item.pronunciation) {
                        content += `
                            <div class="pronunciation">
                                <div class="pronunciation-label">📢 Pronunciation:</div>
                                ${item.pronunciation}
                            </div>
                        `;
                    }

                    if (item.translation) {
                        content += `
                            <div class="translation">
                                <div class="translation-label">🇹🇭 Thai Translation:</div>
                                ${item.translation}
                            </div>
                        `;
                    }

                    content += `
                            </div>
                        </div>
                    `;

                    dialogueEl.innerHTML = content;
                    container.appendChild(dialogueEl);
                }
            });
        }

        // Initial render
        renderDialogue();
    </script>
</body>
</html>
